<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>槟城乔治镇两周年纪念之旅</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
:root {
  --bg: #ffffff; --surface: #ffffff; --hover: #f1f3f4;
  --text: #1a1a2e; --text2: #6b7280; --border: #e5e7eb;
  --blue: #3b82f6; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.05);
  --radius: 12px; --pill: 999px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,html{width:100%;height:100%;font-family:'Inter','Helvetica Neue',Arial,sans-serif;color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit}
svg.ic{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ===== MAP ===== */
#map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1}
.leaflet-control-attribution{font-size:9px!important;opacity:.5}
.custom-marker{background:none!important;border:none!important}
/* Marker: emoji center + number badge */
.mk-wrap{position:relative;width:38px;height:38px}
.mk-body{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.25);transition:transform .15s}
.mk-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9px;background:#1e293b;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 1px 3px rgba(0,0,0,.3);border:2px solid #fff}

/* ===== TOP BAR ===== */
.topbar{position:fixed;top:12px;left:12px;right:12px;z-index:1000;display:flex;gap:8px;align-items:center;max-width:480px;margin:0 auto;pointer-events:none}
.topbar>*{pointer-events:auto}
.search-pill{flex:1;height:44px;background:var(--surface);border-radius:var(--pill);box-shadow:var(--shadow-md);display:flex;align-items:center;padding:0 6px;gap:2px}
.search-pill input{flex:1;height:100%;border:none;outline:none;background:none;font-size:14px;padding:0 8px;color:var(--text)}
.search-pill input::placeholder{color:var(--text2)}
.ibtn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.ibtn:hover,.ibtn:active{background:var(--hover);color:var(--text)}

/* ===== DAY CHIPS ===== */
.chips{position:fixed;top:72px;left:12px;right:12px;max-width:480px;margin:0 auto;z-index:1000;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:4px 0;pointer-events:none}
.chips::-webkit-scrollbar{display:none}
.chips>*{pointer-events:auto}
.chip{flex-shrink:0;padding:6px 14px;border-radius:var(--pill);font-size:12px;font-weight:600;background:var(--surface);box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;border:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px}
.chip.on{color:#fff}
.chip:not(.on):hover{background:var(--hover)}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ===== SIDEBAR SECTIONS ===== */
.sb-section{padding:0 20px}
.sb-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:12px 0 6px;display:flex;align-items:center;gap:6px}
.sb-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sb-divider{height:1px;background:var(--border);margin:0}

/* ===== FILTER CHIPS (itinerary type filter) ===== */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0 8px}
.fchip{flex-shrink:0;padding:5px 12px;border-radius:var(--pill);font-size:11px;font-weight:600;background:var(--surface);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:4px;color:var(--text2);border:1.5px solid rgba(0,0,0,.1);box-shadow:var(--shadow-sm)}
.fchip.on{background:var(--text);color:#fff;border-color:var(--text)}
.fchip:not(.on):hover{background:var(--hover)}

/* ===== NEARBY CHIPS ===== */
.nearby-section{padding:0 20px;border-top:1px solid var(--border)}
.type-bar{display:flex;gap:5px;flex-wrap:wrap;padding:4px 0 8px}
.tchip{flex-shrink:0;padding:5px 10px;border-radius:var(--pill);font-size:10px;font-weight:600;background:rgba(255,255,255,.92);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:3px;color:var(--text2);border:1.5px solid rgba(0,0,0,.06);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tchip.on{background:#3b82f6;color:#fff;border-color:#3b82f6}
.tchip:not(.on):hover{background:#e5e7eb}

/* ===== TRANSPORT MODE SELECTOR ===== */
.transport-bar{display:flex;gap:4px;padding:6px 0 10px}
.tmode{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:9px;font-weight:600;color:var(--text2);background:#f9fafb;border:1.5px solid transparent}
.tmode.on{background:#eff6ff;color:#2563eb;border-color:#3b82f6}
.tmode:hover:not(.on){background:#f1f5f9}
.tmode svg{width:20px;height:20px}

/* ===== NEARBY POI markers ===== */
.poi-marker{background:none!important;border:none!important}
.poi-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.7;transition:opacity .2s,transform .2s;cursor:pointer;background:rgba(255,255,255,.9);box-shadow:0 1px 5px rgba(0,0,0,.2);border:1.5px solid rgba(0,0,0,.1)}
.poi-dot:hover{opacity:1;transform:scale(1.4);z-index:999;box-shadow:0 3px 10px rgba(0,0,0,.3)}

/* ===== RIGHT FAB COLUMN ===== */
.fabs{position:fixed;right:12px;z-index:950;display:flex;flex-direction:column;gap:10px}
.fabs.top-fabs{top:12px}
.fabs.bot-fabs{bottom:100px}
.fab{width:42px;height:42px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.fab:hover{color:var(--blue);box-shadow:var(--shadow-lg)}

/* ===== BOTTOM STRIP (compact, non-intrusive) ===== */
.bot-strip{position:fixed;bottom:0;left:0;right:0;z-index:900;transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom,8px)}
.bot-strip.closed .panel{max-height:0;padding:0 16px;overflow:hidden;opacity:0}
.bot-strip.closed .strip-head svg.arr{transform:rotate(180deg)}

.strip-head{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px;background:var(--surface);border-radius:16px 16px 0 0;box-shadow:var(--shadow-lg);cursor:pointer;user-select:none}
.strip-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.strip-title .badge{font-size:11px;font-weight:700;background:var(--blue);color:#fff;border-radius:var(--pill);padding:2px 8px}
.strip-meta{font-size:11px;color:var(--text2);display:flex;gap:12px;align-items:center}
.strip-meta span{display:flex;align-items:center;gap:3px}
svg.arr{width:18px;height:18px;transition:transform .3s}

/* ===== PANEL (scrollable list) ===== */
.panel{max-height:40vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--surface);padding:4px 16px 12px;transition:all .3s cubic-bezier(.4,0,.2,1);opacity:1}

/* ===== OPT BUTTONS inside panel header ===== */
.opt-row{display:flex;gap:6px;padding:6px 0 8px}
.opt-pill{flex:1;padding:7px 0;border-radius:var(--pill);font-size:11px;font-weight:600;background:#f3f4f6;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--text2)}
.opt-pill:hover{background:var(--blue);color:#fff}
.opt-pill svg{width:14px;height:14px}

/* ===== PLACE ROW ===== */
.prow{display:flex;align-items:center;gap:10px;padding:10px 4px;border-radius:8px;cursor:pointer;transition:background .12s}
.prow:hover{background:var(--hover)}
.prow.off{opacity:.35}
.pnum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.pmeta{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmeta .rat{color:var(--amber);font-weight:600}
.pbtn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;transition:all .12s}
.pbtn:hover{background:var(--hover);color:var(--blue)}
.pbtn svg{width:16px;height:16px}
.pbtn.active{color:var(--blue)}

/* ===== DETAIL CARD (expandable under place row) ===== */
.pdetail{max-height:0;overflow:hidden;transition:max-height .25s cubic-bezier(.4,0,.2,1),padding .25s;padding:0 4px 0 40px}
.pdetail.open{max-height:300px;padding:4px 4px 10px 40px}
.pdetail-inner{font-size:12px;color:var(--text2);line-height:1.6}
.pdetail-inner .dl{display:flex;gap:6px;align-items:baseline;margin-bottom:2px}
.pdetail-inner .dl-k{color:var(--text);font-weight:600;white-space:nowrap;min-width:40px}
.pdetail-inner .dl-v{flex:1}
.pdetail-inner .notes{margin-top:6px;padding:6px 10px;background:#f9fafb;border-radius:6px;font-size:11px;line-height:1.5;color:var(--text)}
.pdetail-inner .nav-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:5px 12px;background:var(--blue);color:#fff;border-radius:var(--pill);font-size:11px;font-weight:600;text-decoration:none;transition:opacity .15s}
.pdetail-inner .nav-link:hover{opacity:.85}

/* ===== RATING PILLS ===== */
.rat-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.rat-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--pill);font-size:11px;font-weight:600;background:#fef3c7;color:#92400e;text-decoration:none;transition:all .12s;border:1px solid #fde68a}
.rat-pill:hover{background:#fde68a;transform:scale(1.03)}
.rat-pill .rp-score{font-weight:700;color:#b45309}
.rat-pill .rp-src{font-weight:400;color:#92400e;font-size:10px}

/* ===== SEGMENT CONNECTOR ===== */
.seg{display:flex;align-items:center;gap:6px;padding:0 4px 0 38px;font-size:10px;color:var(--text2)}
.seg-line{width:2px;height:14px;border-radius:1px}
.seg svg{width:12px;height:12px}

/* ===== TAG BADGE ===== */
.tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--pill);display:inline-flex;align-items:center}
.tag-start{background:#d1fae5;color:#059669}
.tag-end{background:#fee2e2;color:#dc2626}

/* ===== CONTEXT MENU ===== */
.ctx{position:fixed;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:2000;min-width:160px;padding:6px 0;display:none}
.ctx.show{display:block}
.ctx-i{padding:9px 14px;font-size:13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.ctx-i:hover{background:var(--hover)}
.ctx-i svg{width:16px;height:16px;color:var(--text2)}

/* ===== TOAST ===== */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(15,23,42,.88);color:#fff;padding:12px 24px;border-radius:var(--pill);font-size:13px;font-weight:500;z-index:3000;opacity:0;transition:all .25s;pointer-events:none;backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px}
.toast.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
@keyframes spin{to{transform:rotate(360deg)}}
.toast .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}

/* ===== DESKTOP SIDEBAR LAYOUT (min-width: 768px) ===== */
@media (min-width: 768px) {
  /* Increase baseline readability metrics */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

  .poi-dot { width: 28px; height: 28px; font-size: 15px; border-width: 2px; }
  .mk-body { width: 44px; height: 44px; font-size: 22px; border-radius: 12px; }
  .mk-badge { top: -6px; right: -6px; min-width: 22px; height: 22px; border-radius: 11px; font-size: 13px; }
  .tchip, .fchip { font-size: 12px; padding: 6px 14px; gap: 6px; }
  .tchip .fic { font-size: 10px; }
  .chip { font-size: 14px; padding: 8px 18px; }
  
  /* Layout Architecture */
  .sidebar {
    position: absolute; top: 0; left: 0; bottom: 0; width: 380px;
    background: var(--surface); z-index: 2000;
    display: flex; flex-direction: column;
    box-shadow: 2px 0 15px rgba(0,0,0,0.1);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: auto;
  }
  .sidebar.closed { transform: translateX(-100%); }
  
  .sidebar-toggle {
    display: flex !important; position: absolute; right: -32px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 64px; background: var(--surface);
    border-radius: 0 12px 12px 0; box-shadow: 4px 0 8px rgba(0,0,0,0.06);
    align-items: center; justify-content: center; cursor: pointer;
    border-left: 1px solid var(--border); color: var(--text2);
    transition: color 0.2s, background 0.2s;
  }
  .sidebar-toggle:hover { color: var(--blue); background: #f8fafc; }
  .sidebar.closed .sidebar-toggle svg { transform: rotate(180deg); }

  /* Reset Mobile Fixed Positions inside Sidebar */
  .topbar, .chips, .bot-strip {
    position: relative !important;
    top: auto !important; left: auto !important; right: auto !important; bottom: auto !important;
    max-width: none !important; margin: 0 !important;
  }
  
  /* Internal Sidebar Flow */
  .topbar { padding: 16px 20px 8px; }
  .search-pill { box-shadow: 0 2px 6px rgba(0,0,0,0.08); border: 1px solid var(--border); height: 48px; }
  .search-pill input { font-size: 15px; }
  
  .chips { padding: 4px 20px 8px; flex-wrap: wrap; }
  
  .bot-strip { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 0; background: transparent; }
  
  .strip-head { cursor: default; border-radius: 0; box-shadow: none; padding: 12px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); }
  .strip-title { font-size: 15px; }
  .strip-head svg.arr { display: none; }
  
  .panel { max-height: none !important; flex: 1; display: flex; flex-direction: column; overflow: hidden; opacity: 1 !important; padding: 0; }
  .opt-row { padding: 8px 20px 4px; }
  #list { flex: 1; overflow-y: auto; padding: 4px 20px 16px; }
  
  /* Map controls push */
  .leaflet-left .leaflet-control { transition: margin-left 0.3s; margin-left: 390px; }
  .sidebar.closed ~ #map .leaflet-left .leaflet-control { margin-left: 10px; }
}
@media (max-width: 767px) {
  .sidebar { display: contents; }
  .sidebar-toggle { display: none; }
}
</style>
</head>
<body>

<div id="map"></div>

<!-- DESKTOP SIDEBAR WRAPPER -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('closed');">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="search-pill">
      <button class="ibtn" onclick="togglePanel()" title="地点列表">
        <svg class="ic" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <input id="q" placeholder="搜索地点..." autocomplete="off">
      <button class="ibtn" onclick="locateMe()" title="我的位置">
        <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
      </button>
    </div>
  </div>

  <!-- DAY CHIPS -->
  <div class="chips" id="chips"></div>

  <!-- FILTER + TRANSPORT SECTION -->
  <div class="sb-section">
    <div class="sb-label">筛选</div>
    <div class="filter-bar" id="filterbar">
      <div class="fchip" data-ft="restaurant" onclick="filterType('restaurant')">🍜 餐饮</div>
      <div class="fchip" data-ft="attraction" onclick="filterType('attraction')">🏛️ 景点</div>
      <div class="fchip" data-ft="hotel" onclick="filterType('hotel')">🏨 酒店</div>
      <div class="fchip" data-ft="transport" onclick="filterType('transport')">🚉 交通</div>
      <div class="fchip" data-ft="nature" onclick="filterType('nature')">🌿 自然</div>
      <div class="fchip" data-ft="cafe" onclick="filterType('cafe')">☕ 咖啡</div>
      <div class="fchip" data-ft="visited" onclick="filterVisited()">✅ 已去过</div>
    </div>

    <div class="sb-label">交通方式</div>
    <div class="transport-bar" id="transportbar">
      <div class="tmode on" data-mode="driving" onclick="setTransport('driving')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 17h14M5 17a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h8l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2M5 17v2m14-2v2"/><circle cx="7.5" cy="14" r="1.5"/><circle cx="16.5" cy="14" r="1.5"/></svg>
        驾车
      </div>
      <div class="tmode" data-mode="walking" onclick="setTransport('walking')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2"/><path d="M10 22l2-7 3 3v6M14 13l-4-1-1.5-5.5"/><path d="M8.5 7.5l4 1 2 3"/></svg>
        步行
      </div>
      <div class="tmode" data-mode="cycling" onclick="setTransport('cycling')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 100-2 1 1 0 000 2zM12 17.5V14l-3-3 4-3 2 3h3"/></svg>
        骑行
      </div>
    </div>
  </div>

  <div class="sb-divider"></div>

  <!-- NEARBY / 周边 SECTION -->
  <div class="nearby-section">
    <div class="sb-label">周边探索</div>
    <div class="type-bar" id="typebar">
      <div class="tchip" data-type="restaurant" onclick="nearbyToggle('restaurant')">🍜 餐饮</div>
      <div class="tchip" data-type="hotel" onclick="nearbyToggle('hotel')">🏨 酒店</div>
      <div class="tchip" data-type="attraction" onclick="nearbyToggle('attraction')">🏛️ 景点</div>
      <div class="tchip" data-type="transport" onclick="nearbyToggle('transport')">🚉 交通</div>
      <div class="tchip" data-type="shopping" onclick="nearbyToggle('shopping')">🛒 商超</div>
      <div class="tchip" data-type="cafe" onclick="nearbyToggle('cafe')">☕ 咖啡</div>
      <div class="tchip" data-type="convenience" onclick="nearbyToggle('convenience')">🏪 便利店</div>
      <div class="tchip" data-type="toilets" onclick="nearbyToggle('toilets')">🚻 厕所</div>
      <div class="tchip" data-type="atm" onclick="nearbyToggle('atm')">🏧 ATM</div>
      <div class="tchip" data-type="pharmacy" onclick="nearbyToggle('pharmacy')">💊 药店</div>
    </div>
  </div>

  <div class="sb-divider"></div>

  <!-- BOTTOM STRIP + PANEL -->
  <div class="bot-strip" id="bstrip">
    <div class="strip-head" onclick="togglePanel()">
      <div class="strip-title">
        🗺️ 行程
        <span class="badge" id="cnt">0</span>
        <span class="strip-meta" id="summary"></span>
      </div>
      <svg class="ic arr" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    
    <div class="panel" id="panel">

        <br><a href="https://www.google.com/maps/dir/?api=1&destination=${el.lat},${el.lon}" target="_blank" style="color:#3b82f6;font-size:11px;font-weight:600">🧭 导航</a>
      </div>`);
    nearbyMarkers.push(m);
  });
  
  showToast(`✅ 找到 ${elems.length} 个附近${q.label}`,2500);
}

function expandPlace(i){
  // Toggle expanded state — if same, collapse; otherwise expand new
  if(S.expanded===i){S.expanded=null}else{S.expanded=i;flyTo(i)}
  // Toggle detail panels without full re-render for smooth animation
  document.querySelectorAll('.pdetail').forEach(d=>{
    const id=parseInt(d.id.replace('pd-',''));
    d.classList.toggle('open',id===S.expanded);
  });
}
function toggle(i){
  if(S.en.has(i)){S.en.delete(i);if(S.ls===i)S.ls=null;if(S.le===i)S.le=null}else S.en.add(i);
  saveSt();refreshMk();render();drawRt();
}
function toggleVisited(i){

  });

}
function flyTo(i){

  map.flyTo([lat,lng],16,{duration:.8});S.mk[i].openPopup();

/* OSRM (multi-server failover + transport mode) */
let transportMode='driving';
const OSRM_PROFILES={
  driving:['https://routing.openstreetmap.de/routed-car','https://router.project-osrm.org'],
  walking:['https://routing.openstreetmap.de/routed-foot'],
  cycling:['https://routing.openstreetmap.de/routed-bike']
};
function setTransport(mode){
  transportMode=mode;
  document.querySelectorAll('.tmode').forEach(t=>t.classList.toggle('on',t.dataset.mode===mode));
  drawRt();
}
async function osrmFetch(path){
  const servers=OSRM_PROFILES[transportMode]||OSRM_PROFILES.driving;
  for(const srv of servers){
    try{
      const c=new AbortController();
      const t=setTimeout(()=>c.abort(),8000);
      const r=await fetch(srv+path,{signal:c.signal});
      clearTimeout(t);
      if(r.ok){const d=await r.json();if(d.code==='Ok')return d}
    }catch(e){console.warn('[OSRM] Server failed:',srv,e.message)}
  }
  return null;
}
async function osrmRoute(wp){
  if(wp.length<2)return null;
  const profile=transportMode||'driving';
  const path=`/route/v1/${profile}/${wp.map(p=>`${p[0]},${p[1]}`).join(';')}?overview=full&geometries=geojson&steps=false`;
  const d=await osrmFetch(path);
  if(d&&d.routes&&d.routes.length)return d.routes[0];
  // Fallback: straight line
  const [a,b]=wp;
  const dist=haversine(a[1],a[0],b[1],b[0]);
  return{distance:dist,duration:dist/500*60,geometry:{type:'LineString',coordinates:wp}};
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,p=Math.PI/180;
  const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
async function osrmTable(wp){
  if(wp.length<2)return null;
  const path=`/table/v1/driving/${wp.map(p=>`${p[0]},${p[1]}`).join(';')}?annotations=duration,distance`;
  const d=await osrmFetch(path);
  if(d)return{dur:d.durations,dist:d.distances};
  // Fallback: compute haversine matrix
  const n=wp.length,dur=[],dist=[];
  for(let i=0;i<n;i++){dur[i]=[];dist[i]=[];for(let j=0;j<n;j++){const dd=haversine(wp[i][1],wp[i][0],wp[j][1],wp[j][0]);dist[i][j]=dd;dur[i][j]=dd/500*60}}
  return{dur,dist};
}

/* Draw Routes */
async function drawRt(){
  S.rl.forEach(l=>map.removeLayer(l));S.al.forEach(l=>map.removeLayer(l));
  S.rl=[];S.al=[];S.seg=[];
  let ri=enIdx();
  if(S.day!==null)ri=ri.filter(i=>gDay(S.ft[i])===S.day);
  if(ri.length<2){updSummary();return}
  const wp=ri.map(i=>S.ft[i].geometry.coordinates);
  const segs=[];
  for(let i=0;i<ri.length-1;i++)segs.push(osrmRoute([wp[i],wp[i+1]]));
  const sr=await Promise.all(segs);
  let td=0,tt=0;S.seg=[];
  sr.forEach((r,si)=>{
    if(!r){S.seg.push(null);return}
    S.seg.push({distance:r.distance,duration:r.duration});
    td+=r.distance;tt+=r.duration;
    const co=r.geometry.coordinates.map(c=>[c[1],c[0]]);
    const d=gDay(S.ft[ri[si]]),cl=dc(d).c;
    S.rl.push(L.polyline(co,{color:'#1e293b',weight:7,opacity:.15,lineCap:'round'}).addTo(map));
    S.rl.push(L.polyline(co,{color:cl,weight:4,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(map));
    addArrows(co,cl);
  });
  S._totalDist=td;S._totalDur=tt;
  updSummary();render();
}
function addArrows(co,cl){
  if(co.length<2)return;
  let tl=0;for(let i=1;i<co.length;i++)tl+=map.distance(co[i-1],co[i]);
  const na=Math.max(2,Math.min(6,Math.floor(tl/2000))),iv=tl/(na+1);
  let tr=0,ai=1;
  for(let i=1;i<co.length&&ai<=na;i++){
    tr+=map.distance(co[i-1],co[i]);
    if(tr>=iv*ai){
      const b=bearing(co[i-1],co[i]);
      const ic=L.divIcon({html:`<div style="transform:rotate(${b}deg);font-size:12px;color:${cl};text-shadow:0 0 3px rgba(0,0,0,.3)">▶</div>`,className:'custom-marker',iconSize:[12,12],iconAnchor:[6,6]});
      S.al.push(L.marker(co[i],{icon:ic,interactive:false}).addTo(map));ai++;
    }
  }
}
function bearing(a,b){
  const [la1,lo1]=[a[0]*Math.PI/180,a[1]*Math.PI/180],[la2,lo2]=[b[0]*Math.PI/180,b[1]*Math.PI/180];
  const dl=lo2-lo1,y=Math.sin(dl)*Math.cos(la2),x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dl);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360-90;
}

/* Toast */
function showToast(msg,dur){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('on');clearTimeout(t._t);if(dur)t._t=setTimeout(()=>t.classList.remove('on'),dur)}
function hideToast(){document.getElementById('toast').classList.remove('on')}

/* TSP */
async function optimizeRoute(mode){
  const ei=enIdx();
  if(ei.length<3){showToast('⚠️ 至少需要 3 个地点才能优化路线',2500);return}
  const labels={recommended:'推荐',shortest:'最短',fastest:'最快'};
  showToast(`<div class="spinner"></div> 正在计算${labels[mode]||''}路线...`);
  const wp=ei.map(i=>S.ft[i].geometry.coordinates);
  const tb=await osrmTable(wp);
  if(!tb){showToast('❌ 路线计算失败，请稍后重试',3000);return}
  const n=ei.length,mx=mode==='fastest'?tb.dur:tb.dist;
  let si=0,eI=null;
  if(S.ls!==null){si=ei.indexOf(S.ls);if(si<0)si=0}
  if(S.le!==null){eI=ei.indexOf(S.le);if(eI<0)eI=null}
  const vis=new Set([si]),ord=[si];let cur=si;
  const exE=eI!==null&&eI!==si;
  while(ord.length<(exE?n-1:n)){
    let bn=-1,bc=Infinity;
    for(let j=0;j<n;j++){if(vis.has(j)||exE&&j===eI)continue;if(mx[cur][j]<bc){bc=mx[cur][j];bn=j}}
    if(bn<0)break;vis.add(bn);ord.push(bn);cur=bn;
  }
  if(exE)ord.push(eI);
  const ne=ord.map(i=>ei[i]),rf=ne.map(i=>S.ft[i]),of=S.ft.filter((_,i)=>!ei.includes(i));
  S.ft=[...rf,...of];S.en=new Set(rf.map((_,i)=>i));
  if(S.ls!==null)S.ls=0;if(S.le!==null)S.le=rf.length-1;
  saveSt();mkAll();render();drawRt();
  showToast(`✅ 已按「${labels[mode]||''}」优化路线`,2000);
}

/* Context Menu */
function showCtx(e,i){if(e.preventDefault)e.preventDefault();S.ctx=i;const m=document.getElementById('ctx');m.style.left=Math.min(e.clientX,innerWidth-170)+'px';m.style.top=Math.min(e.clientY,innerHeight-180)+'px';m.classList.add('show')}
function hideCtx(){document.getElementById('ctx').classList.remove('show')}
function setStart(){S.ls=S.ctx;if(!S.en.has(S.ctx))S.en.add(S.ctx);saveSt();refreshMk();render();drawRt();hideCtx()}
function setEnd(){S.le=S.ctx;if(!S.en.has(S.ctx))S.en.add(S.ctx);saveSt();refreshMk();render();drawRt();hideCtx()}
function clearLock(){if(S.ls===S.ctx)S.ls=null;if(S.le===S.ctx)S.le=null;saveSt();refreshMk();render();hideCtx()}
function navTo(){const f=S.ft[S.ctx];if(f)window.open(navUrl(f),'_blank');hideCtx()}

function extractChineseName(p){
  if(p.name_local && /[\u4e00-\u9fff]/.test(p.name_local)) return p.name_local;
  if(p.name && /[\u4e00-\u9fff]/.test(p.name)) return p.name;
  const n=p.notes||'';
  const parts=n.split('|').map(s=>s.trim());
  for(const part of parts){ if(/[\u4e00-\u9fff]/.test(part)) return part; }
  return '';
}
function extractEnglishName(p){
  if(p.name && /[A-Za-z]/.test(p.name)) return p.name;
  if(p.name_local && /[A-Za-z]/.test(p.name_local)) return p.name_local;
  const n=p.notes||'';
  const parts=n.split('|').map(s=>s.trim());
  for(const part of parts){ if(/[A-Za-z]/.test(part) && !/[\u4e00-\u9fff]/.test(part)) return part; }
  return '';
}
function displayNameHtml(p){
  const zh=extractChineseName(p);
  const en=extractEnglishName(p);
  if(zh && en && zh!==en) return `${zh}<span style="color:#6b7280;font-size:11px;font-weight:500"> / ${en}</span>`;
  return zh || en || p.name || p.name_local || '';
}

/* Utils */
function fmtDist(m){return!m&&m!==0?'—':m>=1000?(m/1000).toFixed(1)+'km':Math.round(m)+'m'}
function fmtDur(s){if(!s&&s!==0)return'—';const h=Math.floor(s/3600),m=Math.round(s%3600/60);return h?h+'h'+m+'min':m+'min'}
function updSummary(){
  const el=document.getElementById('summary');
  if(S._totalDist){el.innerHTML=`<span>📏 ${fmtDist(S._totalDist)}</span><span>⏱ ${fmtDur(S._totalDur)}</span>`}
  else el.innerHTML='';
}
function fitAll(){
  const ei=enIdx();
  const pts=(ei.length?ei:S.ft.map((_,i)=>i)).map(i=>S.ft[i].geometry.coordinates).map(c=>[c[1],c[0]]);
  if(!pts.length)return;pts.length===1?map.setView(pts[0],15):map.fitBounds(L.latLngBounds(pts),{padding:[50,50]});
}
function locateMe(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{
    const ll=[p.coords.latitude,p.coords.longitude];
    map.flyTo(ll,15,{duration:1});
    if(uMk)map.removeLayer(uMk);
    uMk=L.circleMarker(ll,{radius:8,fillColor:'#3b82f6',fillOpacity:1,color:'#fff',weight:3}).addTo(map);
  },()=>{},{enableHighAccuracy:true,timeout:10000});
}
/* Search */
document.getElementById('q').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.prow').forEach(r=>{
    const hay=(r.dataset.search||r.querySelector('.pname')?.textContent||'').toLowerCase();
    r.style.display=!q||hay.includes(q)?'':'none';
  });
});
document.addEventListener('DOMContentLoaded',init);
